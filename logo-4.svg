<?xml version="1.0" encoding="UTF-8"?>
<!--
  FinExperia — Logo 04 "CLUSTER"
  Concept: Growing node constellation — each node larger than the last,
  rising from bottom-left to top-right. The professional network you build
  through experiential learning. More experience = larger node in the network.
  No background box. Pure coral on dark. Premium data-science aesthetic.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;800&amp;family=Inter:wght@600&display=swap');</style>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6F61"/><stop offset="100%" stop-color="#FF9A85"/>
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <line x1="12" y1="63" x2="26" y2="50" stroke="#FF6F61" stroke-width="1"   opacity="0.15"/>
  <line x1="26" y1="50" x2="40" y2="37" stroke="#FF6F61" stroke-width="1.5" opacity="0.25"/>
  <line x1="40" y1="37" x2="54" y2="23" stroke="#FF6F61" stroke-width="2"   opacity="0.42"/>
  <line x1="54" y1="23" x2="65" y2="14" stroke="#FF9A85" stroke-width="1"   opacity="0.28"/>
  <line x1="54" y1="23" x2="63" y2="34" stroke="#FF9A85" stroke-width="1"   opacity="0.20"/>

  <!-- Nodes — size and opacity grow with career progression -->
  <circle cx="12" cy="63" r="3.5" fill="#FF6F61" opacity="0.28"/>
  <circle cx="26" cy="50" r="5"   fill="#FF6F61" opacity="0.48"/>
  <circle cx="40" cy="37" r="7"   fill="#FF6F61" opacity="0.70"/>

  <!-- Primary node: the FinExperia graduate -->
  <circle cx="54" cy="23" r="10"  fill="#FF6F61"/>
  <circle cx="54" cy="23" r="15"  fill="none" stroke="#FF6F61" stroke-width="1.5" opacity="0.22"/>
  <circle cx="54" cy="23" r="22"  fill="none" stroke="#FF6F61" stroke-width="1"   opacity="0.07"/>

  <!-- Satellite nodes: influence expands outward -->
  <circle cx="65" cy="14" r="4"   fill="#FFB4A2" opacity="0.55"/>
  <circle cx="63" cy="34" r="3"   fill="#FFB4A2" opacity="0.40"/>

  <!-- Wordmark -->
  <text y="47" font-family="'Sora','Helvetica Neue',Arial,sans-serif"
        font-size="28" letter-spacing="-0.5">
    <tspan x="84" font-weight="300" fill="#FFB4A2">Fin</tspan>
    <tspan font-weight="800" fill="url(#wg)">Experia</tspan>
  </text>
  <text x="84" y="63" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="600" fill="#9E7060" letter-spacing="2.5">EXPERIENTIAL LEARNING · INDIA</text>
</svg>
